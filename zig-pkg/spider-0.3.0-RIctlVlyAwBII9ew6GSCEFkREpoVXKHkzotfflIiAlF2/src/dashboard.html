<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        :root {
            --bg: #121212;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --accent: #a3ff12;
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --error: #ff4444;
            --warning: #ffaa00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo { color: var(--accent); font-weight: 800; letter-spacing: 2px; font-size: 18px; }
        .refresh { color: var(--text-dim); font-size: 11px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px;
            text-align: center;
        }
        
        .value {
            font-size: 28px;
            font-weight: 300;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        
        .card.error .value { color: var(--error); }
        .card.warning .value { color: var(--warning); }
        
        .loading { opacity: 0.3; }
        
        .hx-get-Request { transition: opacity 0.2s; }
        .htmx-request .hx-get-Request { opacity: 0.3; }
    </style>
</head>
<body hx-ext="class-tools">
    <div class="header">
        <div class="logo">🕸️ SPIDER</div>
        <div class="refresh">Auto-refresh every 5s</div>
    </div>
    
    <div id="metrics-panel"
         hx-get="/_spider/dashboard/panel"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML"
         class="hx-get-Request">
        <div class="grid">
            <div class="card">
                <div class="value">-</div>
                <div class="label">UPTIME</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">REQUESTS</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">ERRORS</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">SLOW REQ</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">WS CLIENTS</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">BYTES IN</div>
            </div>
            <div class="card">
                <div class="value">-</div>
                <div class="label">BYTES OUT</div>
            </div>
        </div>
    </div>
</body>
</html>
