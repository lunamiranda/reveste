{% block "base" %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% template "title" %}</title>
    <link rel="stylesheet" href="/assets/styles.css">

    <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>
    <div class="rv-nav-wrapper">
        <nav class="rv-nav">
            <div class="rv-logo">
                <a href="/"><img src="/assets/logo.png" alt="ReVeste" height="24"></a>
            </div>
            <ul class="rv-links">
                <li {% if current == '/' %}class="active"{% endif %}><a href="/" hx-get="/" hx-target="#main" hx-push-url="true" hx-select="#main">Início</a></li>
                <li {% if current == '/problema' %}class="active"{% endif %}><a href="/problema" hx-get="/problema" hx-target="#main" hx-push-url="true" hx-select="#main">Problema</a></li>
                <li {% if current == '/solucao' %}class="active"{% endif %}><a href="/solucao" hx-get="/solucao" hx-target="#main" hx-push-url="true" hx-select="#main">Solução</a></li>
                <li {% if current == '/como-funciona' %}class="active"{% endif %}><a href="/como-funciona" hx-get="/como-funciona" hx-target="#main" hx-push-url="true" hx-select="#main">Como funciona</a></li>
                <li {% if current == '/sobre' %}class="active"{% endif %}><a href="/sobre" hx-get="/sobre" hx-target="#main" hx-push-url="true" hx-select="#main">Sobre nós</a></li>
                <li {% if current == '/doar' %}class="active"{% endif %}><a href="/doar" hx-get="/doar" hx-target="#main" hx-push-url="true" hx-select="#main">Doação</a></li>
            </ul>
            <button class="rv-hamburger" id="menuBtn" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </div>

    <main id="main">
        {% template "content" %}
    </main>

    <script>
      const menuBtn = document.getElementById('menuBtn');
      const navLinks = document.querySelector('.rv-links');
      if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', () => {
          navLinks.classList.toggle('open');
        });
      }

      document.body.addEventListener('htmx:afterSwap', function(evt) {
        // Close mobile menu on navigation
        if (navLinks) {
          navLinks.classList.remove('open');
        }

        // Update active nav link
        const url = window.location.pathname;
        document.querySelectorAll('.rv-links a').forEach(link => {
          link.parentElement.classList.remove('active');
          if (link.getAttribute('href') === url) {
            link.parentElement.classList.add('active');
          }
        });
      });
    </script>
</body>
</html>
{% end %}
