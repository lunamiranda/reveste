{% block "content" %}
<div class="schedule-section visible" id="agendar">
    <div class="section">
        <h2 class="section-title" style="text-align: center;">Agende sua coleta</h2>
        <form class="schedule-form" hx-post="/agendar" hx-target="#schedule-section" hx-swap="innerHTML">
            <h3>Vamos buscar suas roupas</h3>
            <p>Preencha os dados abaixo e nossa equipe entrará em contato para combinar a coleta.</p>
            <div class="form-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Telefone/WhatsApp</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="address">Endereço para coleta</label>
                <input type="text" id="address" name="address" placeholder="Rua, número, bairro, cidade" required>
            </div>
            <div class="form-group">
                <label for="pieces">Quantidade aproximada de peças</label>
                <input type="text" id="pieces" name="pieces" placeholder="Ex: 2 sacolas grandes">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Solicitar coleta</button>
        </form>
    </div>
</div>
{% end %}
